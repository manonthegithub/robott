openapi: 3.0.3
info:
  title: Robot Control API
  version: 1.0.0
  description: >
    HTTP API for controlling LED, stepper motor, and servo motor on a
    Raspberry Pi 5 robot. Commands are queued and executed asynchronously;
    a 202 response means the command was accepted onto the queue, not that
    it finished executing.
paths:
  /led:
    post:
      operationId: postLed
      summary: Turn the LED on or off
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LedOperation'
      responses:
        '202':
          $ref: '#/components/responses/Queued'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/QueueFull'
  /stepper:
    post:
      operationId: postStepper
      summary: Move the stepper motor a number of steps in a direction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StepperOperation'
      responses:
        '202':
          $ref: '#/components/responses/Queued'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/QueueFull'
  /servo:
    post:
      operationId: postServo
      summary: Set the servo to an absolute angle in degrees
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServoOperation'
      responses:
        '202':
          $ref: '#/components/responses/Queued'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/QueueFull'
  /sequence:
    post:
      operationId: postSequence
      summary: Start a sequence of commands and loops
      description: >
        Runs seq as a background sequence: leaf steps are enqueued (after
        their own delay_ms) in order, loop steps repeat their nested body
        times times (or forever if times is 0/omitted). Only one sequence
        may run at a time; starting one while another is running returns
        409. A full command queue backpressures the sequence rather than
        rejecting the request (unlike /led, /stepper, /servo).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SequenceRequest'
      responses:
        '202':
          $ref: '#/components/responses/Queued'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalError'
  /sequence/stop:
    post:
      operationId: postSequenceStop
      summary: Stop the currently running sequence, if any
      responses:
        '202':
          $ref: '#/components/responses/Stopped'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    LedOperation:
      type: object
      required: [type, on]
      properties:
        type:
          type: string
          enum: [led]
        on:
          type: boolean
        delay_ms:
          type: integer
          minimum: 0
          default: 0
          description: Milliseconds to wait before enqueuing. 0 (default) means the existing synchronous behavior (queued before the response is sent).
    StepperOperation:
      type: object
      required: [type, steps, dir]
      properties:
        type:
          type: string
          enum: [stepper]
        steps:
          type: integer
          minimum: 1
          description: Number of steps, must be positive. Enforced in code, not just schema.
        dir:
          type: string
          enum: [cw, ccw]
          description: Enforced in code, not just schema (see docs/plan.md component 8 decision note).
        delay_ms:
          type: integer
          minimum: 0
          default: 0
          description: Milliseconds to wait before enqueuing. 0 (default) means the existing synchronous behavior (queued before the response is sent).
    ServoOperation:
      type: object
      required: [type, angle_deg]
      properties:
        type:
          type: string
          enum: [servo]
        angle_deg:
          type: number
          format: double
          description: Must fall within the server's configured servo angle range (checked in code, range is runtime config, not a schema constant).
        delay_ms:
          type: integer
          minimum: 0
          default: 0
          description: Milliseconds to wait before enqueuing. 0 (default) means the existing synchronous behavior (queued before the response is sent).
    LoopOperation:
      type: object
      required: [type, body]
      properties:
        type:
          type: string
          enum: [loop]
        times:
          type: integer
          minimum: 0
          default: 0
          description: Number of repetitions; 0 (default) means infinite (runs until /sequence/stop).
        body:
          type: array
          minItems: 1
          description: Nested operations to repeat. Enforced non-empty in code (see docs/plan.md component 12's ErrEmptyLoopBody).
          items:
            $ref: '#/components/schemas/Operation'
    ParOperation:
      type: object
      required: [type, branches]
      properties:
        type:
          type: string
          enum: [par]
        branches:
          type: array
          minItems: 1
          description: >
            Each branch is a list of operations run concurrently with the
            other branches (one goroutine per branch); the sequence only
            continues past this step once every branch finishes. Enforced
            non-empty (both the branch list and each branch) in code (see
            docs/plan.md component 12's ErrEmptyPar/ErrEmptyParBranch).
            Branches still funnel into the same command queue, so this
            doesn't make hardware dispatch itself simultaneous — see
            docs/architecture.md.
          items:
            type: array
            minItems: 1
            items:
              $ref: '#/components/schemas/Operation'
    Operation:
      oneOf:
        - $ref: '#/components/schemas/LedOperation'
        - $ref: '#/components/schemas/ServoOperation'
        - $ref: '#/components/schemas/StepperOperation'
        - $ref: '#/components/schemas/LoopOperation'
        - $ref: '#/components/schemas/ParOperation'
      discriminator:
        propertyName: type
        mapping:
          led: '#/components/schemas/LedOperation'
          servo: '#/components/schemas/ServoOperation'
          stepper: '#/components/schemas/StepperOperation'
          loop: '#/components/schemas/LoopOperation'
          par: '#/components/schemas/ParOperation'
    SequenceRequest:
      type: object
      required: [seq]
      properties:
        seq:
          type: array
          items:
            $ref: '#/components/schemas/Operation'
    QueuedResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: queued
    StoppedResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: stopped
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

  responses:
    Queued:
      description: Command accepted onto the queue (not yet executed)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/QueuedResponse'
    Stopped:
      description: The running sequence was stopped
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StoppedResponse'
    BadRequest:
      description: Request failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    QueueFull:
      description: Command queue has no free capacity, retry later
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: A sequence is already running
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: No sequence is currently running
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Unexpected server-side failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
